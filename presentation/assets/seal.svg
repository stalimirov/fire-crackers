<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <path id="outer-ring" d="M 100,16 A 84,84 0 1,1 99.9,16"/>
    <path id="top-arc"    d="M 22,100 A 78,78 0 0,1 178,100"/>
    <path id="bottom-arc" d="M 32,115 A 78,78 0 0,0 168,115"/>
  </defs>

  <!-- outer double ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="currentColor" stroke-width="3"/>
  <circle cx="100" cy="100" r="84" fill="none" stroke="currentColor" stroke-width="1.5"/>

  <!-- arc text top -->
  <text font-family="'Barlow Condensed', sans-serif" font-weight="700"
        font-size="14" fill="currentColor" letter-spacing="3">
    <textPath href="#top-arc" startOffset="50%" text-anchor="middle">FIRE CRACKERS</textPath>
  </text>

  <!-- arc text bottom -->
  <text font-family="'Barlow Condensed', sans-serif" font-weight="700"
        font-size="11" fill="currentColor" letter-spacing="2">
    <textPath href="#bottom-arc" startOffset="50%" text-anchor="middle">SNACK RESPONSIBLY</textPath>
  </text>

  <!-- small divider dots -->
  <circle cx="100" cy="18"  r="3" fill="currentColor"/>
  <circle cx="100" cy="182" r="3" fill="currentColor"/>

  <!-- center flame icon -->
  <g transform="translate(100,88)">
    <!-- flame body -->
    <path d="M 0,-28 C 14,-14 18,0 8,14 C 4,20 -4,20 -8,14 C -18,0 -14,-14 0,-28 Z"
          fill="currentColor"/>
    <!-- inner flame highlight -->
    <path d="M 0,-16 C 7,-6 9,4 4,10 C 1,14 -1,14 -4,10 C -9,4 -7,-6 0,-16 Z"
          fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"/>
    <!-- base glow -->
    <ellipse cx="0" cy="16" rx="10" ry="5" fill="currentColor" opacity="0.5"/>
  </g>

  <!-- inner ring -->
  <circle cx="100" cy="100" r="40" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"/>
</svg>
