<!-- Blaze: chili pepper body, wick + flame on top, gloved hands, wide confident stance -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" fill="currentColor">
  <!-- flame on wick -->
  <ellipse cx="60" cy="10" rx="7" ry="11"/>
  <!-- wick stem -->
  <rect x="57" y="20" width="6" height="20" rx="3"/>
  <!-- pepper body (teardrop) -->
  <path d="M 26 72 C 18 48 30 38 60 38 C 90 38 102 48 94 72 C 102 106 72 122 60 126 C 48 122 18 106 26 72 Z"/>
  <!-- left arm -->
  <path d="M 30 70 C 12 63 2 74 4 84" stroke="currentColor" stroke-width="12" fill="none" stroke-linecap="round"/>
  <circle cx="4"   cy="85" r="10"/>
  <!-- right arm -->
  <path d="M 90 70 C 108 63 118 74 116 84" stroke="currentColor" stroke-width="12" fill="none" stroke-linecap="round"/>
  <circle cx="116" cy="85" r="10"/>
  <!-- feet -->
  <ellipse cx="44"  cy="134" rx="13" ry="8"/>
  <ellipse cx="76"  cy="134" rx="13" ry="8"/>
</svg>
