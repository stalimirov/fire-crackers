<!-- Matchstick: tall thin body, rounded matchstick head, twitchy energy -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 200" fill="currentColor">
  <!-- matchstick head (lit) -->
  <ellipse cx="30" cy="22" rx="14" ry="18"/>
  <!-- thin stick body -->
  <rect x="24" y="38" width="12" height="106" rx="5"/>
  <!-- left arm -->
  <path d="M 25 85 C 8 78 2 90 4 98" stroke="currentColor" stroke-width="8" fill="none" stroke-linecap="round"/>
  <circle cx="3"  cy="99" r="7"/>
  <!-- right arm -->
  <path d="M 35 85 C 52 78 58 90 56 98" stroke="currentColor" stroke-width="8" fill="none" stroke-linecap="round"/>
  <circle cx="57" cy="99" r="7"/>
  <!-- feet -->
  <ellipse cx="22" cy="152" rx="10" ry="6"/>
  <ellipse cx="38" cy="152" rx="10" ry="6"/>
</svg>
