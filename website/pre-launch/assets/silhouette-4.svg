<!-- Carolina: tall elegant pepper body, dramatic Reaper tail curving behind -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 200" fill="currentColor">
  <!-- tall pepper body -->
  <path d="M 32 72 C 24 46 36 36 66 34 C 96 36 108 46 100 72 C 108 104 78 118 66 122 C 54 118 24 104 32 72 Z"/>
  <!-- Carolina Reaper tail (curves down and behind) -->
  <path d="M 64 116 C 82 132 116 140 128 158 C 136 170 128 184 114 180"
        stroke="currentColor" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- left arm -->
  <path d="M 36 70 C 16 62 8 74 10 84" stroke="currentColor" stroke-width="11" fill="none" stroke-linecap="round"/>
  <circle cx="10" cy="85" r="9"/>
  <!-- right arm (slightly raised, composed) -->
  <path d="M 96 64 C 112 54 118 62 116 72" stroke="currentColor" stroke-width="11" fill="none" stroke-linecap="round"/>
  <circle cx="116" cy="73" r="9"/>
  <!-- feet -->
  <ellipse cx="50" cy="130" rx="12" ry="7"/>
  <ellipse cx="82" cy="130" rx="12" ry="7"/>
</svg>
