<!-- Smoky: medium body surrounded by drifting smoke clouds -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 170" fill="currentColor">
  <!-- smoke clouds (above and around) -->
  <ellipse cx="55"  cy="28"  rx="18" ry="15"/>
  <ellipse cx="82"  cy="18"  rx="20" ry="17"/>
  <ellipse cx="110" cy="28"  rx="16" ry="14"/>
  <ellipse cx="26"  cy="54"  rx="18" ry="15"/>
  <ellipse cx="16"  cy="74"  rx="15" ry="13"/>
  <ellipse cx="22"  cy="94"  rx="17" ry="14"/>
  <ellipse cx="134" cy="50"  rx="17" ry="14"/>
  <ellipse cx="144" cy="70"  rx="15" ry="12"/>
  <ellipse cx="138" cy="90"  rx="16" ry="13"/>
  <!-- main body -->
  <ellipse cx="80"  cy="82"  rx="38" ry="42"/>
  <!-- arms (partially obscured by smoke) -->
  <path d="M 44 80 C 26 72 20 84 22 94" stroke="currentColor" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M 116 80 C 134 72 140 84 138 94" stroke="currentColor" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- feet -->
  <ellipse cx="60"  cy="130" rx="14" ry="8"/>
  <ellipse cx="100" cy="130" rx="14" ry="8"/>
  <!-- trailing smoke wisps below -->
  <ellipse cx="44"  cy="146" rx="12" ry="7"/>
  <ellipse cx="116" cy="148" rx="11" ry="6"/>
  <ellipse cx="78"  cy="158" rx="10" ry="6"/>
</svg>
