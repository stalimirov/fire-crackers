<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lb-close" id="lb-close" aria-label="Close">×</button>
  <img id="lb-img" src="" alt="">
</div>

<!-- ══════════════════════════════════════════════════════════
     SCRIPT
═══════════════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ── Lightbox ─────────────────────────────────────────────── */
const lb     = document.getElementById('lightbox');
const lbImg  = document.getElementById('lb-img');
const lbClose = document.getElementById('lb-close');

document.querySelectorAll('#art-gallery img').forEach(img => {
  img.addEventListener('click', () => {
    lbImg.src = img.src;
    lbImg.alt = img.alt;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  });
});

function closeLb() {
  lb.classList.remove('open');
  lbImg.src = '';
  document.body.style.overflow = '';
}
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
lbClose.addEventListener('click', closeLb);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });

/* ── Snack gallery filters ────────────────────────────────── */
document.querySelectorAll('.snack-filter').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.snack-filter').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    document.querySelectorAll('.snack-item').forEach(item => {
      item.style.display = (f === 'all' || item.dataset.region === f) ? '' : 'none';
    });
  });
});

/* ── Side nav active state ────────────────────────────────── */
const sections = document.querySelectorAll('section[id]');
const navLinks  = document.querySelectorAll('.sidenav a');

const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      navLinks.forEach(a => a.classList.remove('active'));
      const active = document.querySelector(`.sidenav a[href="#${e.target.id}"]`);
      if (active) active.classList.add('active');
    }
  });
}, { threshold: 0.4 });

sections.forEach(s => obs.observe(s));
</script>
